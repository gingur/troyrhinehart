name: Smoke - Infisical OIDC trust verification
on:
  workflow_dispatch:
    inputs:
      project_slug:
        description: "Infisical project slug (visible in the project URL)"
        required: true
        default: gingur
      env_slug:
        description: "Infisical environment slug"
        required: true
        default: production

permissions:
  id-token: write
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch secrets from Infisical via GitHub OIDC
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: oidc
          identity-id: f87b7cde-3016-4e85-84b5-0d077e8833e0
          audience: https://github.com/gingur
          project-slug: ${{ inputs.project_slug }}
          env-slug: ${{ inputs.env_slug }}
          secret-path: /troyrhinehart
          export-type: env

      - name: Verify fetch succeeded (no values printed)
        run: |
          echo "=== Smoke test results ==="
          if [ -n "${CF_API_TOKEN:-}" ]; then
            echo "OK CF_API_TOKEN fetched (length=${#CF_API_TOKEN})"
          else
            echo "FAIL CF_API_TOKEN missing or empty"; exit 1
          fi
          if [ -n "${CF_ACCOUNT_ID:-}" ]; then
            echo "OK CF_ACCOUNT_ID fetched (length=${#CF_ACCOUNT_ID})"
          else
            echo "FAIL CF_ACCOUNT_ID missing or empty"; exit 1
          fi
          echo ""
          echo "OIDC trust chain VERIFIED."
