name: Rollback

on:
  workflow_dispatch:
    inputs:
      env:
        description: Target environment (production only)
        type: choice
        options: [production]
        default: production
      version:
        description: Cloudflare version UUID (blank = previous version)
        type: string
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  rollback:
    uses: gingur/devkit/.github/workflows/cf.worker.rollback.yml@main
    with:
      env: ${{ inputs.env }}
      version: ${{ inputs.version }}
      infisicalProject: gingur-7xjq
      infisicalEnv: production
      infisicalPath: /troyrhinehart
      infisicalIdentity: f87b7cde-3016-4e85-84b5-0d077e8833e0
    secrets: inherit
